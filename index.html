<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galactus Studios</title>

<!-- ✅ FAVICON FIX (important: add cache-buster) -->
<link rel="icon" type="image/png" href="logo.png?v=2">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        background: #000;
        color: white;
        font-family: 'Press Start 2P', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 20px;
        color: #b84dff;
    }

    .top-video {
        width: 80%;
        max-width: 900px;
        margin-top: 20px;
    }

    .top-video iframe {
        width: 100%;
        height: 420px;
        border: none;
        border-radius: 10px;
    }

    .container {
        display: flex;
        gap: 25px;
        margin-top: 40px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .window {
        width: 320px;
        height: 180px;
        background: #111;
        border: 2px solid #333;
        border-radius: 10px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 0 20px rgba(255,20,147,0.15);
        transition: 0.3s;
    }

    .window:hover {
        transform: scale(1.05);
        border-color: #FF1493;
        box-shadow: 0 0 25px #FF1493;
    }

    .title {
        font-size: 12px;
    }

    .center-text {
        font-size: 10px;
        color: #FF1493;
        text-align: center;
    }

    .btn {
        background: #FF1493;
        border: none;
        padding: 8px;
        color: white;
        font-size: 10px;
        cursor: pointer;
        border-radius: 6px;
        font-family: 'Press Start 2P', monospace;
        width: 100%;
    }

    .btn:hover {
        background: #ff4fb0;
    }
</style>
</head>

<body>

<h1>Galactus Studios</h1>

<!-- TOP VIDEO -->
<div class="top-video">
    <iframe src="https://youtu.be/Q-y6CI8orR8" allowfullscreen></iframe>
</div>

<!-- PROJECTS -->
<div class="container" id="container"></div>

<script>

const apps = [
    {
        name: "Aim Trainer",
        label: "Galactus Project",
        download: "https://www.mediafire.com/file/k1gay29e48rw03n/Aim_Trainer.zip/file"
    },
    {
        name: "CPS Tester",
        label: "Galactus Project",
        download: "https://www.mediafire.com/file/9tm2yaqtxuqz5xw/CPS_Test.zip/file"
    },
    {
        name: "Fake Login",
        label: "Galactus Project",
        download: "https://www.mediafire.com/file/jjap9eciku7dwh8/Fake_Login.zip/file"
    },
    {
        name: "Wowza! (Coming Soon)",
        label: "Unfinished",
        download: "https://www.mediafire.com/file/jjap9eciku7dwh8/Fake_Login.zip/file"
    }
];

const container = document.getElementById("container");

apps.forEach(app => {
    const div = document.createElement("div");
    div.className = "window";

    div.innerHTML = `
        <div class="title">${app.name}</div>
        <div class="center-text">${app.label}</div>
        <button class="btn">Download</button>
    `;

    div.querySelector("button").onclick = () => {
        window.location.href = app.download;
    };

    container.appendChild(div);
});

</script>

</body>
</html>
